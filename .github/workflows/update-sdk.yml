name: Update SDK Submodule

on:
  repository_dispatch:
    types: [sdk-update]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update submodule to tag
        run: |
          cd agent-sdk
          git fetch --tags
          git checkout ${{ github.event.client_payload.tag }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add agent-sdk
          git commit -m "update sdk to ${{ github.event.client_payload.tag }}" || echo "No changes"
          git push

      - name: Create matching tag
        run: |
          git tag ${{ github.event.client_payload.tag }} || echo "Tag exists"
          git push origin ${{ github.event.client_payload.tag }} || echo "Already pushed"